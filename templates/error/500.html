<!DOCTYPE html>
<html th:replace="~{modules/layout :: html(head = null, content = ~{::content})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="zh-CN">

<th:block th:fragment="content">
<style>
/* 500 错误页 */
.error-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    padding: 48px 24px;
    text-align: center;
}
.error-illustration {
    width: 160px;
    height: 160px;
    margin-bottom: 28px;
    animation: error-wiggle 2s ease-in-out infinite;
}
@keyframes error-wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
}
.error-code {
    font-size: 64px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--color-brand), var(--color-brand-hover));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 0 0 12px;
    letter-spacing: -2px;
}
.error-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--color-text-primary);
    margin: 0 0 8px;
    font-family: 'Noto Sans SC', sans-serif;
}
.error-desc {
    font-size: 14px;
    color: var(--color-text-muted);
    margin: 0 0 32px;
    line-height: 1.6;
    max-width: 360px;
}
.error-actions {
    display: flex;
    gap: 12px;
    align-items: center;
}
.error-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.25s ease;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    border: none;
}
.error-btn--primary {
    background: linear-gradient(135deg, var(--color-brand), var(--color-brand-hover));
    color: #fff;
    box-shadow: 0 4px 16px rgba(var(--color-brand-rgb), 0.25);
}
.error-btn--primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(var(--color-brand-rgb), 0.35);
}
.error-btn--ghost {
    background: var(--color-bg-secondary);
    color: var(--color-text-secondary);
    border: 1px solid var(--color-border-primary);
}
.error-btn--ghost:hover {
    background: var(--color-bg-tertiary);
    color: var(--color-text-primary);
}
.error-hint {
    margin-top: 40px;
    font-size: 12px;
    color: var(--color-text-muted);
    opacity: 0.6;
}
@media (max-width: 767px) {
    .error-wrap { min-height: 50vh; padding: 32px 16px; }
    .error-illustration { width: 120px; height: 120px; margin-bottom: 20px; }
    .error-code { font-size: 48px; }
    .error-title { font-size: 18px; }
    .error-desc { font-size: 13px; }
    .error-actions { flex-direction: column; width: 100%; max-width: 240px; }
    .error-btn { width: 100%; justify-content: center; }
}
[data-theme="dark"] .error-btn--ghost {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.1);
    color: var(--color-text-muted);
}
[data-theme="dark"] .error-btn--ghost:hover {
    background: rgba(255,255,255,0.1);
    color: var(--color-text-primary);
}
</style>

<div class="error-wrap">
    <!-- 小机器人 SVG -->
    <svg class="error-illustration" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="bot-grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="var(--color-brand)" stop-opacity="0.15"/>
                <stop offset="100%" stop-color="var(--color-brand)" stop-opacity="0.06"/>
            </linearGradient>
        </defs>
        <!-- 天线 -->
        <line x1="100" y1="28" x2="100" y2="48" stroke="var(--color-brand)" stroke-width="2.5" stroke-opacity="0.4" stroke-linecap="round"/>
        <circle cx="100" cy="24" r="5" fill="var(--color-brand)" opacity="0.3"/>
        <!-- 头部 -->
        <rect x="55" y="48" width="90" height="72" rx="20" fill="url(#bot-grad)" stroke="var(--color-brand)" stroke-width="2" stroke-opacity="0.3"/>
        <!-- 眼睛（X_X 晕倒眼） -->
        <g opacity="0.5">
            <line x1="76" y1="78" x2="88" y2="90" stroke="var(--color-brand)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="88" y1="78" x2="76" y2="90" stroke="var(--color-brand)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="112" y1="78" x2="124" y2="90" stroke="var(--color-brand)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="124" y1="78" x2="112" y2="90" stroke="var(--color-brand)" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <!-- 嘴巴（波浪线表示困惑） -->
        <path d="M82 105 Q91 100 100 105 Q109 110 118 105" stroke="var(--color-brand)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
        <!-- 腮红 -->
        <circle cx="65" cy="98" r="7" fill="#FF6B9D" opacity="0.1"/>
        <circle cx="135" cy="98" r="7" fill="#FF6B9D" opacity="0.1"/>
        <!-- 身体 -->
        <rect x="68" y="125" width="64" height="40" rx="12" fill="url(#bot-grad)" stroke="var(--color-brand)" stroke-width="2" stroke-opacity="0.3"/>
        <!-- 身体上的灯 -->
        <circle cx="88" cy="142" r="4" fill="var(--color-brand)" opacity="0.3"/>
        <circle cx="100" cy="142" r="4" fill="#FF6B9D" opacity="0.25"/>
        <circle cx="112" cy="142" r="4" fill="var(--color-brand)" opacity="0.15"/>
        <!-- 胳膊 -->
        <rect x="42" y="128" width="20" height="10" rx="5" fill="url(#bot-grad)" stroke="var(--color-brand)" stroke-width="1.5" stroke-opacity="0.25"/>
        <rect x="138" y="128" width="20" height="10" rx="5" fill="url(#bot-grad)" stroke="var(--color-brand)" stroke-width="1.5" stroke-opacity="0.25"/>
        <!-- 腿 -->
        <rect x="78" y="168" width="14" height="16" rx="5" fill="url(#bot-grad)" stroke="var(--color-brand)" stroke-width="1.5" stroke-opacity="0.25"/>
        <rect x="108" y="168" width="14" height="16" rx="5" fill="url(#bot-grad)" stroke="var(--color-brand)" stroke-width="1.5" stroke-opacity="0.25"/>
    </svg>

    <p class="error-code">500</p>
    <h1 class="error-title">服务器开小差了</h1>
    <p class="error-desc">别担心，服务器只是暂时累了，稍后再试试就好~</p>

    <div class="error-actions">
        <a href="/" class="error-btn error-btn--primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            回到首页
        </a>
        <button onclick="location.reload()" class="error-btn error-btn--ghost">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            重新加载
        </button>
    </div>

    <p class="error-hint">这个问题已经记录下来了，会尽快修复</p>
</div>
</th:block>
</html>
