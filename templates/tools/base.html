<style>
.json-tool{max-width:1100px;margin:0 auto;padding:16px 0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
.json-panel{background:var(--color-bg-secondary);border-radius:14px;border:1px solid var(--color-border-primary);overflow:hidden;padding:16px}
.json-tool-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--color-text-secondary);font-weight:500;background:none;border:none;font-family:inherit}
.json-tool-btn:hover{background:rgba(var(--color-brand-rgb,155,126,216),.08)}
.json-tool-btn.active{background:var(--color-brand);color:#fff}
.json-tool-btn .icon{font-size:16px}
.json-input{width:100%;padding:10px 14px;font-size:14px;font-family:'SF Mono','Menlo',monospace;background:var(--color-bg-tertiary);border:1.5px solid var(--color-border-primary);border-radius:10px;color:var(--color-text-primary);outline:none;box-sizing:border-box}
.json-input:focus{border-color:var(--color-brand);box-shadow:0 0 0 3px var(--color-brand-glow)}
.base-result{background:var(--color-bg-tertiary);border:1px solid var(--color-border-primary);border-radius:10px;padding:14px;font-family:'SF Mono','Menlo',monospace;font-size:13px;line-height:2;color:var(--color-text-primary);white-space:pre-wrap;word-break:break-all;min-height:80px;margin-top:12px}
.base-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.base-label{font-size:13px;font-weight:600;color:var(--color-text-secondary);white-space:nowrap}
.base-select{padding:8px 12px;font-size:13px;background:var(--color-bg-tertiary);border:1.5px solid var(--color-border-primary);border-radius:8px;color:var(--color-text-primary);outline:none;cursor:pointer}
.base-select:focus{border-color:var(--color-brand)}
</style>

<div class="json-tool">
  <div class="json-panel">
    <div class="base-row">
      <span class="base-label">输入数值</span>
      <input class="json-input" id="baseNum" value="255" placeholder="输入数值" style="flex:1" oninput="convert()" />
      <select class="base-select" id="baseFrom" onchange="convert()">
        <option value="2">二进制</option>
        <option value="8">八进制</option>
        <option value="10" selected>十进制</option>
        <option value="16">十六进制</option>
      </select>
    </div>
    <div class="base-result" id="baseResult"></div>
  </div>
</div>

<script>
function convert(){
  try{
    var val=parseInt(document.getElementById('baseNum').value,parseInt(document.getElementById('baseFrom').value));
    if(isNaN(val)){document.getElementById('baseResult').textContent='无效数值';return}
    document.getElementById('baseResult').textContent='二进制 (BIN):    '+val.toString(2)+'\n八进制 (OCT):    '+val.toString(8)+'\n十进制 (DEC):    '+val.toString(10)+'\n十六进制 (HEX):  '+val.toString(16).toUpperCase();
  }catch(e){document.getElementById('baseResult').textContent='转换失败'}
}
convert();
</script>
