<style>
.json-tool{max-width:1100px;margin:0 auto;padding:16px 0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
.json-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;background:var(--color-bg-secondary);border-radius:12px;padding:8px 12px;border:1px solid var(--color-border-primary)}
.json-toolbar-left,.json-toolbar-right{display:flex;gap:4px;flex-wrap:wrap}
.json-tool-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--color-text-secondary);font-weight:500;background:none;border:none;font-family:inherit}
.json-tool-btn:hover{background:rgba(var(--color-brand-rgb,155,126,216),.08)}
.json-tool-btn.active{background:var(--color-brand);color:#fff}
.json-tool-btn .icon{font-size:16px}
.json-panels{display:flex;flex-direction:column;gap:12px}
@media(min-width:768px){.json-panels{flex-direction:row}.json-panel{flex:1;min-width:0}}
.json-panel{background:var(--color-bg-secondary);border-radius:14px;border:1px solid var(--color-border-primary);overflow:hidden;display:flex;flex-direction:column}
.json-panel-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--color-border-primary)}
.json-panel-title{font-size:13px;font-weight:600;color:var(--color-text-secondary)}
.json-panel-actions{display:flex;gap:12px}
.json-panel-action{font-size:13px;color:var(--color-brand);cursor:pointer;background:none;border:none;font-family:inherit}
.json-panel-action:hover{opacity:.8}
.json-input{padding:12px 16px;font-size:14px;font-family:'SF Mono','Menlo','JetBrains Mono',monospace;color:var(--color-text-primary);background:transparent;border:none;width:100%;box-sizing:border-box;resize:none;outline:none;min-height:300px;line-height:1.6}
.json-output{padding:12px 16px;font-size:13px;font-family:'SF Mono','Menlo','JetBrains Mono',monospace;color:var(--color-text-primary);word-break:break-all;white-space:pre-wrap;line-height:1.6;min-height:300px;overflow:auto}
.json-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--color-text-muted)}
.json-empty-icon{font-size:40px;margin-bottom:12px;opacity:.6}
.json-empty-text{font-size:14px}
.json-copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:8px 20px;background:var(--color-success);color:#fff;border-radius:20px;font-size:13px;font-weight:600;z-index:999;animation:jsonPop .3s ease-out}
@keyframes jsonPop{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(max-width:767px){.json-input{min-height:200px}.json-output{min-height:200px}}
</style>

<div class="json-tool">
  <div class="json-toolbar">
    <div class="json-toolbar-left">
      <button class="json-tool-btn active" id="flagG" onclick="toggleFlag('g')"><span class="icon">g</span></button>
      <button class="json-tool-btn" id="flagI" onclick="toggleFlag('i')"><span class="icon">i</span></button>
      <button class="json-tool-btn" id="flagM" onclick="toggleFlag('m')"><span class="icon">m</span></button>
    </div>
    <div class="json-toolbar-right">
      <button class="json-tool-btn" onclick="copyOutput()"><span class="icon">📋</span> 复制</button>
    </div>
  </div>
  <div class="json-panels">
    <div class="json-panel">
      <div class="json-panel-header">
        <span class="json-panel-title">正则表达式</span>
      </div>
      <div style="padding:12px 16px">
        <input class="json-input" id="rePattern" placeholder="输入正则表达式..." value="\b\w+\b" style="min-height:auto" oninput="process()" />
      </div>
      <div class="json-panel-header">
        <span class="json-panel-title">测试文本</span>
      </div>
      <textarea class="json-input" id="reText" placeholder="输入测试文本..." oninput="process()">Hello World 123 test456</textarea>
    </div>
    <div class="json-panel">
      <div class="json-panel-header">
        <span class="json-panel-title">匹配结果</span>
        <div class="json-panel-actions"><button class="json-panel-action" onclick="copyOutput()">复制</button></div>
      </div>
      <div class="json-output" id="reOutput"><div class="json-empty"><div class="json-empty-icon">🔍</div><div class="json-empty-text">输入正则和测试文本</div></div></div>
    </div>
  </div>
</div>

<script>
var reFlags='g';
function toggleFlag(f){
  if(reFlags.includes(f))reFlags=reFlags.replace(f,'');
  else reFlags+=f;
  document.getElementById('flag'+f.toUpperCase()).classList.toggle('active',reFlags.includes(f));
  process();
}
document.getElementById('flagG').classList.add('active');

function process(){
  var pattern=document.getElementById('rePattern').value;
  var text=document.getElementById('reText').value;
  var output=document.getElementById('reOutput');
  if(!pattern||!text){output.innerHTML='<div class="json-empty"><div class="json-empty-icon">🔍</div><div class="json-empty-text">输入正则和测试文本</div></div>';return}
  try{
    var re=new RegExp(pattern,reFlags);
    var matches=[],m;
    while((m=re.exec(text))!==null){matches.push({val:m[0],idx:m.index});if(!reFlags.includes('g'))break}
    if(!matches.length){output.textContent='无匹配';return}
    output.innerHTML=matches.map(function(m,i){
      return'<div style="margin-bottom:8px"><span style="background:var(--color-brand-light);color:var(--color-brand);padding:2px 8px;border-radius:10px;font-size:11px;margin-right:6px">['+i+')</span>"'+esc(m.val)+'" <span style="color:var(--color-text-muted);font-size:12px">(位置 '+m.idx+')</span></div>';
    }).join('');
  }catch(e){output.innerHTML='<div class="json-error"><span class="json-error-icon">⚠️</span><span class="json-error-text">正则语法错误: '+esc(e.message)+'</span></div>'}
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function copyOutput(){var t=document.getElementById('reOutput').textContent;if(navigator.clipboard)navigator.clipboard.writeText(t);var d=document.createElement('div');d.className='json-copied';d.textContent='✓ 已复制';document.body.appendChild(d);setTimeout(function(){d.remove()},1500)}
process();
</script>
