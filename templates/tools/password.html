<style>
.json-tool{max-width:1100px;margin:0 auto;padding:16px 0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
.json-panel{background:var(--color-bg-secondary);border-radius:14px;border:1px solid var(--color-border-primary);overflow:hidden;padding:16px}
.json-tool-btn{display:flex;align-items:center;gap:4px;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;color:#fff;font-weight:600;background:var(--color-brand);border:none;font-family:inherit}
.json-tool-btn:hover{background:var(--color-brand-hover)}
.json-tool-btn.ghost{background:transparent;color:var(--color-brand);border:1px solid var(--color-border-primary)}
.pw-output{background:var(--color-bg-tertiary);border:1px solid var(--color-border-primary);border-radius:12px;padding:16px;font-family:'SF Mono','Menlo',monospace;font-size:18px;text-align:center;letter-spacing:2px;color:var(--color-text-primary);min-height:50px;margin-bottom:16px;word-break:break-all}
.pw-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.pw-label{font-size:13px;font-weight:600;color:var(--color-text-secondary)}
.pw-input{width:80px;padding:8px 12px;font-size:14px;background:var(--color-bg-tertiary);border:1.5px solid var(--color-border-primary);border-radius:8px;color:var(--color-text-primary);outline:none;text-align:center}
.pw-input:focus{border-color:var(--color-brand)}
.pw-checks{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.pw-checks label{font-size:13px;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:4px}
.pw-checks input{accent-color:var(--color-brand)}
.json-copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:8px 20px;background:var(--color-success);color:#fff;border-radius:20px;font-size:13px;font-weight:600;z-index:999;animation:jsonPop .3s ease-out}
@keyframes jsonPop{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>

<div class="json-tool">
  <div class="json-panel">
    <div class="pw-output" id="pwOutput"></div>
    <div class="pw-row">
      <span class="pw-label">长度</span>
      <input class="pw-input" type="number" id="pwLen" value="16" min="4" max="64" />
    </div>
    <div class="pw-checks">
      <label><input type="checkbox" id="pwUpper" checked> 大写字母</label>
      <label><input type="checkbox" id="pwLower" checked> 小写字母</label>
      <label><input type="checkbox" id="pwDigits" checked> 数字</label>
      <label><input type="checkbox" id="pwSymbols"> 符号</label>
    </div>
    <div style="display:flex;gap:8px">
      <button class="json-tool-btn" onclick="genPw()">生成密码</button>
      <button class="json-tool-btn ghost" onclick="copyPw()">复制</button>
    </div>
  </div>
</div>

<script>
function genPw(){
  var len=parseInt(document.getElementById('pwLen').value,10)||16;
  var chars='';
  if(document.getElementById('pwLower').checked)chars+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('pwUpper').checked)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('pwDigits').checked)chars+='0123456789';
  if(document.getElementById('pwSymbols').checked)chars+='!@#$%^&*()_+-=[]{}|;:,.<>?';
  if(!chars){document.getElementById('pwOutput').textContent='请至少选择一种字符类型';return}
  var pw='';
  for(var i=0;i<len;i++)pw+=chars[Math.random()*chars.length|0];
  document.getElementById('pwOutput').textContent=pw;
}
function copyPw(){var t=document.getElementById('pwOutput').textContent;if(navigator.clipboard)navigator.clipboard.writeText(t);var d=document.createElement('div');d.className='json-copied';d.textContent='✓ 已复制';document.body.appendChild(d);setTimeout(function(){d.remove()},1500)}
genPw();
</script>
