<style>
.json-tool{max-width:1100px;margin:0 auto;padding:16px 0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
.json-panel{background:var(--color-bg-secondary);border-radius:14px;border:1px solid var(--color-border-primary);overflow:hidden;padding:16px}
.json-tool-btn{display:flex;align-items:center;gap:4px;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;color:#fff;font-weight:600;background:var(--color-brand);border:none;font-family:inherit}
.json-tool-btn:hover{background:var(--color-brand-hover)}
.qr-box{display:flex;justify-content:center;padding:24px}
.qr-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--color-text-muted)}
.qr-placeholder-icon{font-size:48px;margin-bottom:12px;opacity:.6}
</style>

<div class="json-tool">
  <div class="json-panel">
    <div style="margin-bottom:16px">
      <label style="font-size:13px;font-weight:600;color:var(--color-text-secondary);display:block;margin-bottom:6px">输入内容</label>
      <textarea class="json-input" id="qrInput" rows="3" placeholder="输入文本或 URL..." style="min-height:auto;max-height:200px">https://aiym.fun</textarea>
    </div>
    <div style="text-align:center;margin-bottom:16px">
      <button class="json-tool-btn" onclick="genQR()" style="display:inline-flex">生成二维码</button>
    </div>
    <div class="qr-box" id="qrBox">
      <div class="qr-placeholder"><div class="qr-placeholder-icon">📱</div><div>点击生成二维码</div></div>
    </div>
  </div>
</div>

<script>
function genQR(){
  var box=document.getElementById('qrBox');
  var text=document.getElementById('qrInput').value;
  if(!text){box.innerHTML='<div class="qr-placeholder"><div class="qr-placeholder-icon">📱</div><div>请输入内容</div></div>';return}
  box.innerHTML='<div style="color:var(--color-text-muted)">加载中...</div>';
  
  if(typeof QRCode!=='undefined'){doQR();return}
  var script=document.createElement('script');
  script.src='https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
  script.onload=doQR;
  document.head.appendChild(script);
  
  function doQR(){
    box.innerHTML='';
    var div=document.createElement('div');
    box.appendChild(div);
    new QRCode(div,{text:text,width:200,height:200,colorDark:'#1a1714',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  }
}
genQR();
</script>
