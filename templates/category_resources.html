<!DOCTYPE html>
<html th:replace="~{modules/layout :: html(head = null, content = ~{::content})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="zh-CN">

<th:block th:fragment="content">
    <div class="resource-library">

        <!-- 推荐资源 -->
        <section class="recommended-section"
                 th:if="${theme.config.content?.resourceCategory}"
                 th:with="recPosts = ${postFinder.list({page: 1, size: theme.config.content?.recommendResourceCount ?: 6, categoryName: theme.config.content.resourceCategory, sort: {'stats.visit,desc', 'spec.publishTime,desc'}})}">
            <div th:if="${not #lists.isEmpty(recPosts?.items)}" class="section-header">
                <h2 class="section-title">推荐资源</h2>
            </div>
            <div th:if="${not #lists.isEmpty(recPosts?.items)}" class="recommended-grid"
                 data-hot-grid>
                <div th:each="post, iter : ${recPosts.items}" class="recommended-card">
                    <a th:href="@{${post.status?.permalink}}" class="recommended-card__link">
                        <div class="recommended-card__cover"
                             th:with="iconUrl = ${#annotations.get(post, 'theme.aiym.fun/icon-url') ?: #annotations.get(post, 'iconUrl')}">
                            <img th:if="${iconUrl}" th:src="${iconUrl}" alt="" loading="lazy">
                            <span th:unless="${iconUrl}" class="recommended-card__cover-letter"
                                  th:text="${#strings.substring(post.spec.title, 0, 1)}">A</span>
                        </div>
                        <div class="recommended-card__info">
                            <h3 class="recommended-card__title" th:text="${post.spec.title}">资源名称</h3>
                            <p class="recommended-card__desc" th:if="${post.status?.excerpt}"
                               th:text="${#strings.abbreviate(#strings.escapeXml(post.status.excerpt), 30)}">资源描述</p>
                        </div>
                        <div class="recommended-card__right">
                            <div class="recommended-card__tags" th:if="${not #lists.isEmpty(post.tags)}">
                                <span th:each="tag : ${post.tags}" th:if="${tagStat.index < 2}"
                                      class="recommended-card__tag"
                                      th:text="${tag.spec.displayName}">标签</span>
                            </div>
                            <div class="recommended-card__stats">
                                <span class="recommended-card__stat">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                    <span th:text="${post.stats?.visit ?: 0}">0</span>
                                </span>
                            </div>
                            <span class="recommended-card__btn">详情</span>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <!-- 全部资源列表 -->
        <section class="all-resources-section">
            <div class="section-header">
                <h2 class="section-title" th:text="${category?.spec.displayName ?: '全部资源'}">全部资源</h2>
            </div>
            <div class="resource-list">
                <div th:each="post : ${posts.items}" class="resource-card">
                    <a th:href="@{${post.status?.permalink}}" class="resource-card__link">
                        <div class="resource-card__icon"
                             th:with="iconUrl = ${#annotations.get(post, 'theme.aiym.fun/icon-url') ?: #annotations.get(post, 'iconUrl')}">
                            <img th:if="${iconUrl}" th:src="${iconUrl}" alt="" class="resource-card__icon-img">
                            <span th:unless="${iconUrl}" class="resource-card__icon-text"
                                  th:text="${#strings.substring(post.spec.title, 0, 1)}">A</span>
                        </div>
                        <div class="resource-card__info">
                            <h3 class="resource-card__title" th:text="${post.spec.title}">资源名称</h3>
                            <p class="resource-card__description" th:if="${post.status?.excerpt}"
                               th:text="${#strings.abbreviate(#strings.escapeXml(post.status.excerpt), 30)}">资源描述</p>
                        </div>
                        <div class="resource-card__right">
                            <div class="resource-card__tags" th:if="${not #lists.isEmpty(post.tags)}">
                                <span th:each="tag : ${post.tags}" th:if="${tagStat.index < 2}"
                                      class="resource-card__tag"
                                      th:text="${tag.spec.displayName}">标签</span>
                            </div>
                            <div class="resource-card__stats">
                                <span class="resource-card__stat">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                    <span th:text="${post.stats?.visit ?: 0}">0</span>
                                </span>
                            </div>
                            <span class="resource-card__btn">详情</span>
                        </div>
                    </a>
                </div>
            </div>

            <div th:replace="~{modules/pagination :: pagination(${posts})}"></div>
        </section>
    </div>
</th:block>

</html>
