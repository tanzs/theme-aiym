<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- 分页组件 -->
<nav th:fragment="pagination(list)" class="pagination" th:if="${list.hasPrevious() or list.hasNext()}" aria-label="分页导航">
    <a th:if="${list.hasPrevious()}" th:href="@{${list.prevUrl}}" class="pagination__btn pagination__btn--prev">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"></polyline></svg>
        上一页
    </a>
    <span class="pagination__info" th:text="|${list.page} / ${list.totalPages}|">1 / 1</span>
    <a th:if="${list.hasNext()}" th:href="@{${list.nextUrl}}" class="pagination__btn pagination__btn--next">
        下一页
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </a>
</nav>

</html>
