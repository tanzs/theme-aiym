<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- 文章卡片 - 有封面 -->
<div th:fragment="post-card(post)" class="post-card"
     th:with="cover = ${post.spec.cover ?: '/assets/default-cover.png'}">
    <a th:href="@{${post.status?.permalink}}" class="post-card__link">
        <div class="post-card__cover" th:if="${post.spec.cover}">
            <img th:src="${post.spec.cover}" th:alt="${post.spec.title}" loading="lazy">
        </div>
        <div class="post-card__content" th:classappend="${!post.spec.cover} ? 'post-card__content--no-cover'">
            <div class="post-card__tags" th:if="${not #lists.isEmpty(post.tags)}">
                <span th:each="tag : ${post.tags}" class="post-card__tag"
                      th:text="${tag.spec.displayName}">标签</span>
            </div>
            <h3 class="post-card__title" th:text="${post.spec.title}">文章标题</h3>
            <p class="post-card__excerpt" th:if="${post.status?.excerpt}"
               th:text="${#strings.abbreviate(#strings.escapeXml(post.status.excerpt), 80)}">文章摘要</p>
            <div class="post-card__footer">
                <div class="post-card__stats">
                    <span class="post-card__stat">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <span th:text="${post.stats?.visit ?: 0}">0</span>
                    </span>
                    <span class="post-card__stat">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        <span th:text="${post.stats?.comment ?: 0}">0</span>
                    </span>
                </div>
                <span class="post-card__time"
                      th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}">2024-01-01</span>
            </div>
        </div>
    </a>
</div>

<!-- 热门文章卡片 - 横向滚动 -->
<div th:fragment="hot-post-card(post, rank)" class="hot-post-card">
    <a th:href="@{${post.status?.permalink}}" class="hot-post-card__link">
        <div class="hot-post-card__cover" th:if="${post.spec.cover}">
            <img th:src="${post.spec.cover}" th:alt="${post.spec.title}" loading="lazy">
            <span class="hot-post-card__rank" th:text="'#' + ${rank}">#1</span>
        </div>
        <div class="hot-post-card__body">
            <h3 class="hot-post-card__title" th:text="${post.spec.title}">文章标题</h3>
            <div class="hot-post-card__meta">
                <span class="hot-post-card__stat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <span th:text="${post.stats?.visit ?: 0}">0</span>
                </span>
                <span class="hot-post-card__dot">·</span>
                <span class="hot-post-card__stat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span th:text="${post.stats?.comment ?: 0}">0</span>
                </span>
            </div>
        </div>
    </a>
</div>

</html>
