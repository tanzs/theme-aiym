apiVersion: theme.halo.run/v1alpha1
kind: Theme
metadata:
  name: theme-aiym
spec:
  displayName: "AIYM-启梦"
  description: "为开发者打造的现代化 Halo 博客主题。支持深色模式、资源库、工具箱、自定义 HTML 页面、全局搜索、移动端适配，开箱即用。"
  author:
    name: "AIYM"
    website: "https://www.aiym.fun"
  logo: "https://www.aiym.fun/logo.png"
  homepage: "https://www.aiym.fun"
  repo: "https://github.com/tanzs/theme-aiym"
  issues: "https://github.com/tanzs/theme-aiym/issues"
  readme: ""
  version: "1.1.0"
  requires: ">=2.25.0"
  settingName: "theme-aiym"
  configMapName: "theme-aiym-config"
  license:
    - name: "MIT"
      url: "https://github.com/tanzs/theme-aiym/blob/main/LICENSE"
  customTemplates:
    post:
      - name: resource
        description: "用于资源类型文章的模板"
        file: post_resource.html
    category:
      - name: resource-category
        description: "用于资源库分类的模板"
        file: category_resources.html
    page:
      - name: search
        description: "独立搜索页面"
        file: page_search.html
      - name: resources
        description: "资源中心页面"
        file: page_resources.html
      - name: about
        description: "关于页面"
        file: page_about.html
      - name: toolbox
        description: "工具箱页面"
        file: page_toolbox.html
