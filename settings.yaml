apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-aiym
spec:
  forms:
    - group: appearance
      label: "外观设置"
      formSchema:
        - $formkit: color
          name: brandColor
          label: "品牌色"
          help: "按钮、链接、激活状态等（hover/浅色自动计算）"
          value: "#42A5F5"
        - $formkit: color
          name: bgColor
          label: "页面背景色"
          help: "页面大背景，暗色模式自动反转"
          value: "#faf8f5"
        - $formkit: color
          name: contentBgColor
          label: "内容背景色"
          help: "文章卡片、代码块等，暗色模式自动反转"
          value: "#ffffff"
        - $formkit: select
          name: defaultMode
          label: "默认模式"
          value: "system"
          options:
            - label: "跟随系统"
              value: "system"
            - label: "浅色模式"
              value: "light"
            - label: "深色模式"
              value: "dark"
        - $formkit: switch
          name: showThemeToggle
          label: "显示主题切换按钮"
          value: true
        - $formkit: switch
          name: enableAnimation
          label: "启用动画"
          value: true




    - group: content
      label: "内容设置"
      formSchema:
        - $formkit: categorySelect
          name: blogCategory
          label: "博客文章分类"
          help: "首页文章列表只显示该分类及其下级分类的文章。不选择则显示全部。"
          multiple: false
        - $formkit: categorySelect
          name: resourceCategory
          label: "资源分类"
          help: "资源页面显示该分类及其下级分类的内容。不选择则不显示资源。"
          multiple: false
        - $formkit: number
          name: postsPerPage
          label: "每页文章数"
          value: 12
          min: 1
          max: 50
        - $formkit: number
          name: hotPostCount
          label: "热门文章数"
          value: 6
          min: 1
          max: 20
        - $formkit: tag
          name: photoGroups
          label: "随机封面图库分组"
          help: "填写图库分组名称（多个用回车分隔）。首页无封面的文章将从这些分组中随机取图。留空则使用全部图库。"
          placeholder: "输入分组名称后回车"
        - $formkit: number
          name: recommendResourceCount
          label: "推荐资源数"
          value: 6
          min: 1
          max: 20




    - group: resource
      label: "资源设置"
      formSchema:
        - $formkit: text
          name: downloadButtonText
          label: "下载按钮文字"
          value: "立即下载"
        - $formkit: text
          name: noDownloadTip
          label: "无下载提示"
          value: "暂未提供下载地址"
        - $formkit: textarea
          name: supplementContent
          label: "补充说明（支持 Markdown）"
          help: "在文章末尾显示，支持 Markdown 格式，如 # 使用说明、# 免责声明"
          rows: 8
          value: "# 使用说明\n\n1. 请从官方渠道下载软件\n2. 安装前请关闭杀毒软件\n3. 如有问题请查看官方文档\n\n# 免责声明\n\n本页面提供的资源链接均来自公开网络，仅供学习与参考使用。"




    - group: toolbox
      label: "工具箱"
      formSchema:
        - $formkit: text
          name: _hint
          label: ""
          help: "📌 内置工具：路径以 /tools/ 开头的自定义页面会自动展示在工具箱中，无需手动配置。每个工具的名称取自页面标题，简介取自页面摘要，图标/分类/颜色在页面 Annotations 中设置（tools.icon、tools.cat、tools.color、tools.bg、tools.sort）。🔗 外部工具：下方可添加 https 外链工具，会在新窗口打开。"
          value: ""
        - $formkit: repeater
          name: toolboxItems
          label: "外部工具（https 链接）"
          children:
            - $formkit: text
              name: name
              label: "工具名称"
              validation: required
            - $formkit: text
              name: desc
              label: "简短描述"
            - $formkit: text
              name: icon
              label: "图标 (Iconify)"
              help: "如 mdi-code-json、tabler:hash"
            - $formkit: color
              name: color
              label: "图标颜色"
              value: "#9b7ed8"
            - $formkit: color
              name: bg
              label: "图标背景色"
              value: "#f3eefa"
            - $formkit: text
              name: path
              label: "链接地址"
              help: "必须是 https:// 开头的外部链接"
              validation: required
            - $formkit: text
              name: cat
              label: "分类"
            - $formkit: text
              name: badge
              label: "标签"
              help: "可选，如：免费、hot"
          value: []




    - group: search
      label: "搜索设置"
      formSchema:
        - $formkit: tag
          name: hotKeywords
          label: "热门搜索关键词"
          help: "输入关键词后回车，显示在搜索弹窗的热门搜索区域"
          placeholder: "输入关键词后回车"
        - $formkit: textarea
          name: hotKeywordsText
          label: "热门搜索（备用）"
          help: "如果 tag 类型不可用，用这个 textarea 输入关键词，每行一个"
          rows: 3
          placeholder: "NAS&#10;Docker&#10;fnOS&#10;Linux"




    - group: about
      label: "关于页面"
      formSchema:
        - $formkit: textarea
          name: aboutContent
          label: "页面内容（HTML）"
          help: "关于页面的主体内容，支持 HTML 标签"
          rows: 12
          value: "<h2>👋 你好呀</h2>\n<p>我是 <strong>AIYM-启梦</strong>，一个轻量级的技术资源分享平台。</p>\n<p>这里汇集了开发工具、技术教程、NAS 玩法等内容，致力于让好工具和好知识被轻松发现。</p>\n\n<h2>✨ 我在做什么</h2>\n<ul>\n<li>🧰 精选开发工具与实用资源</li>\n<li>📚 整理技术教程与学习路线</li>\n<li>🖥️ 分享 NAS 搭建与折腾经验</li>\n<li>🔧 在线小工具，随用随走</li>\n</ul>\n\n<h2>💬 一句话介绍</h2>\n<blockquote>好的工具值得被发现，好的知识值得被分享。</blockquote>\n\n<h2>🛠️ 技术栈</h2>\n<p>本站基于 <strong>Halo 2.x</strong> 构建，主题和前端均为手工打造，追求简洁与实用。</p>"
        - $formkit: repeater
          name: aboutLinks
          label: "联系方式"
          children:
            - $formkit: text
              name: icon
              label: "图标（Iconify）"
              help: "如 ri-wechat-line、ri-github-line"
            - $formkit: text
              name: label
              label: "标签"
            - $formkit: text
              name: value
              label: "值"
            - $formkit: select
              name: action
              label: "点击操作"
              value: "copy"
              options:
                - label: "复制"
                  value: "copy"
                - label: "打开链接"
                  value: "link"
                - label: "发邮件"
                  value: "mail"
            - $formkit: text
              name: qr
              if: "$value.action == 'copy'"
              label: "二维码图片 URL"
              help: "点击后弹窗展示二维码，留空则直接复制"




    - group: record
      label: "备案信息"
      formSchema:
        - $formkit: text
          name: copyrightText
          label: "版权文字"
          help: "留空则默认显示 © 当前年份 站点名称 · All Rights Reserved"
          placeholder: "如 © 2025 AIYM · All Rights Reserved"
        - $formkit: text
          name: icpRecord
          label: "ICP 备案号"
          placeholder: "京ICP备xxxxxxxx号"
        - $formkit: text
          name: icpRecordUrl
          label: "ICP 备案链接"
          placeholder: "https://beian.miit.gov.cn"
          value: "https://beian.miit.gov.cn"
        - $formkit: text
          name: publicSecurityRecord
          label: "公安备案号"
          placeholder: "京公网安备 xxxxxxxxxx号"
        - $formkit: text
          name: publicSecurityUrl
          label: "公安备案链接"
          placeholder: "https://www.beian.gov.cn/portal/registerSystemInfo"
